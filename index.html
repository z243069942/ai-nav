<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 应用导航 — 发现最好的 AI 工具</title>
  <meta name="description" content="精选全球顶级 AI 应用导航，分类展示 ChatGPT、Midjourney、Cursor 等优质 AI 工具，助你高效使用 AI。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <style>
    :root {
      --bg: #0f0f13;
      --bg2: #16161d;
      --bg3: #1e1e2a;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --accent-glow: rgba(108,99,255,0.25);
      --text: #e8e8f0;
      --text2: #9999b3;
      --text3: #6666888;
      --card-hover: #1e1e2e;
      --tag-bg: rgba(108,99,255,0.15);
      --featured-border: rgba(168,139,250,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ——— Header ——— */
    header {
      background: linear-gradient(135deg, #0f0f13 0%, #1a1025 50%, #0f0f13 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
      text-decoration: none;
    }
    .logo span { font-size: 24px; -webkit-text-fill-color: initial; }
    .search-box {
      flex: 1;
      max-width: 520px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px 10px 44px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      font-size: 16px;
      pointer-events: none;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-admin {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-admin:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ——— Hero ——— */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(108,99,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .hero p {
      color: var(--text2);
      font-size: 16px;
      max-width: 560px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent2);
    }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ——— Main Layout ——— */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 60px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ——— Sidebar ——— */
    .sidebar {
      position: sticky;
      top: 80px;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-left: 12px;
    }
    .cat-list { list-style: none; }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 2px;
    }
    .cat-item:hover { background: var(--bg3); color: var(--text); }
    .cat-item.active {
      background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(139,92,246,0.1));
      color: var(--accent2);
      font-weight: 600;
      border: 1px solid rgba(108,99,255,0.3);
    }
    .cat-icon { font-size: 18px; }
    .cat-count {
      margin-left: auto;
      background: var(--bg3);
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 11px;
      color: var(--text2);
    }
    .cat-item.active .cat-count {
      background: rgba(108,99,255,0.25);
      color: var(--accent2);
    }

    /* ——— Content ——— */
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .content-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-count { font-size: 13px; color: var(--text2); font-weight: 400; }
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      background: transparent;
      transition: all 0.2s;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent2); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* ——— Card Grid ——— */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(108,99,255,0.05), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--accent);
      border-color: var(--accent);
    }
    .card:hover::before { opacity: 1; }
    .card.featured {
      border-color: var(--featured-border);
    }
    .card.featured::after {
      content: '⭐ 精选';
      position: absolute;
      top: 12px; right: 12px;
      background: linear-gradient(135deg, rgba(168,139,250,0.2), rgba(139,92,246,0.1));
      border: 1px solid rgba(168,139,250,0.4);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--accent2);
      font-weight: 600;
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-logo {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .card-logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .card-url {
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      background: var(--tag-bg);
      color: var(--accent2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ——— Empty state ——— */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }
    .empty .emoji { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; margin-bottom: 8px; }

    /* ——— Footer ——— */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
    }
    footer a { color: var(--accent2); text-decoration: none; }

    /* ——— Responsive ——— */
    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        overflow-x: auto;
      }
      .cat-list {
        display: flex;
        gap: 8px;
        white-space: nowrap;
        padding-bottom: 4px;
      }
      .cat-item { margin-bottom: 0; flex-shrink: 0; }
    }
    @media (max-width: 600px) {
      .hero { padding: 40px 16px 28px; }
      .header-inner { gap: 12px; }
      .search-box { max-width: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html"><span>🤖</span> AI 导航</a>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索 AI 工具..." autocomplete="off" />
    </div>
    <div class="header-right">
      <a class="btn-admin" href="admin.html">⚙️ 管理后台</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>发现最好的 AI 工具</h1>
  <p>精选全球顶级 AI 应用，分类整理，助你快速找到适合的 AI 工具，提升效率与创造力。</p>
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num" id="totalApps">—</div>
      <div class="stat-label">AI 应用</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalCats">—</div>
      <div class="stat-label">分类目录</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="featuredCount">—</div>
      <div class="stat-label">精选推荐</div>
    </div>
  </div>
</section>

<div class="main-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">分类目录</div>
    <ul class="cat-list" id="catList"></ul>
  </aside>

  <!-- Content -->
  <main>
    <div class="content-header">
      <div class="content-title">
        <span id="currentCatIcon"></span>
        <span id="currentCatName">全部工具</span>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="filter-pills">
        <button class="pill active" data-filter="all">全部</button>
        <button class="pill" data-filter="featured">精选</button>
        <button class="pill" data-filter="free">免费</button>
      </div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </main>
</div>

<footer>
  <p>🤖 AI 导航 &nbsp;·&nbsp; 持续收录优质 AI 工具 &nbsp;·&nbsp; <a href="admin.html">管理后台</a></p>
</footer>

<script>
  const DATA_URL = 'data.json';
  let allData = { categories: [], apps: [] };
  let currentCat = 'all';
  let currentFilter = 'all';
  let searchQuery = '';

  async function loadData() {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    allData = await res.json();
    init();
  }

  function init() {
    // Stats
    document.getElementById('totalApps').textContent = allData.apps.length;
    document.getElementById('totalCats').textContent = allData.categories.length;
    document.getElementById('featuredCount').textContent = allData.apps.filter(a => a.featured).length;

    renderSidebar();
    renderCards();
  }

  function renderSidebar() {
    const list = document.getElementById('catList');
    const counts = {};
    allData.apps.forEach(a => counts[a.category] = (counts[a.category] || 0) + 1);

    const allItem = `<li class="cat-item ${currentCat === 'all' ? 'active' : ''}" onclick="selectCat('all')">
      <span class="cat-icon">🌐</span> 全部
      <span class="cat-count">${allData.apps.length}</span>
    </li>`;

    const items = allData.categories.map(c => `
      <li class="cat-item ${currentCat === c.id ? 'active' : ''}" onclick="selectCat('${c.id}')">
        <span class="cat-icon">${c.icon}</span> ${c.name}
        <span class="cat-count">${counts[c.id] || 0}</span>
      </li>
    `).join('');

    list.innerHTML = allItem + items;
  }

  function renderCards() {
    let apps = [...allData.apps];

    // Category filter
    if (currentCat !== 'all') apps = apps.filter(a => a.category === currentCat);

    // Feature/free filter
    if (currentFilter === 'featured') apps = apps.filter(a => a.featured);
    if (currentFilter === 'free') apps = apps.filter(a => a.tags && a.tags.some(t => t.includes('免费')));

    // Search
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      apps = apps.filter(a =>
        a.name.toLowerCase().includes(q) ||
        a.description.toLowerCase().includes(q) ||
        (a.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }

    // Update header
    const cat = allData.categories.find(c => c.id === currentCat);
    document.getElementById('currentCatIcon').textContent = cat ? cat.icon : '🌐';
    document.getElementById('currentCatName').textContent = cat ? cat.name : '全部工具';
    document.getElementById('resultCount').textContent = `（${apps.length} 个）`;

    const grid = document.getElementById('cardGrid');
    if (apps.length === 0) {
      grid.innerHTML = `<div class="empty">
        <div class="emoji">🔍</div>
        <h3>未找到相关工具</h3>
        <p>换个关键词试试，或浏览其他分类</p>
      </div>`;
      return;
    }

    grid.innerHTML = apps.map(app => {
      const domain = new URL(app.url).hostname;
      return `<a class="card ${app.featured ? 'featured' : ''}" href="${app.url}" target="_blank" rel="noopener">
        <div class="card-head">
          <div class="card-logo">
            <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64"
                 onerror="this.style.display='none';this.parentElement.textContent='🤖'"
                 alt="${app.name}" />
          </div>
          <div>
            <div class="card-name">${app.name}</div>
            <div class="card-url">${domain}</div>
          </div>
        </div>
        <div class="card-desc">${app.description}</div>
        <div class="card-tags">${(app.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </a>`;
    }).join('');
  }

  function selectCat(id) {
    currentCat = id;
    renderSidebar();
    renderCards();
  }

  // Filter pills
  document.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderCards();
    });
  });

  // Search
  const searchInput = document.getElementById('searchInput');
  let searchTimer;
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value;
      renderCards();
    }, 200);
  });

  loadData().catch(err => {
    document.getElementById('cardGrid').innerHTML = `<div class="empty">
      <div class="emoji">⚠️</div>
      <h3>数据加载失败</h3>
      <p>请刷新页面重试</p>
    </div>`;
  });
</script>
</body>
</html>
